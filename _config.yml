# Site settings
title: Javi GG # site title
description: >-
  data scientist
lang: en-US # default lang
timezone: Asia/Jakarta # set your timezone
image: assets/img/avatar.jpg # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/JAVI897/javigg # site repo [optional]
mode: light # default theme "dark" | "light"

# Profile settings
author:
  name: Javi GG # author name
  bio: >- # tell to the world
    Data Science UnderGrad at UPV. Curious programmer, tinkers around in Python and R. This is my personal website!
  username: Javi GG # social media username eg. github, twitter 
  email: s.javi.com@gmail.com # your contact adress
  avatar: /assets/img/avatar.jpg # change with your own avatar

# Url settings
url: "https://javi897.github.io"
baseurl:
permalink: /:title/
google_analytics: UA-171036340-1
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Build settings
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-sass-converter
  - jekyll-postfiles
